apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: invoice-api-alerts
  labels:
    app.kubernetes.io/name: invoice-api
    release: prometheus
spec:
  groups:
    - name: invoice-api.availability
      rules:
        - alert: invoice-apiHighErrorRate
          expr: sum(rate(http_requests_total{service="invoice-api",status=~"5.."}[5m])) / sum(rate(http_requests_total{service="invoice-api"}[5m])) > 0.05
          for: 10m
          labels:
            severity: warning
            team: Commerce
          annotations:
            summary: invoice-api has elevated 5xx responses.
            runbook_url: docs/RUNBOOK.md
        - alert: invoice-apiUnavailable
          expr: up{job="invoice-api"} == 0
          for: 5m
          labels:
            severity: critical
            team: Commerce
          annotations:
            summary: invoice-api is not being scraped or is unavailable.
            runbook_url: docs/RUNBOOK.md
